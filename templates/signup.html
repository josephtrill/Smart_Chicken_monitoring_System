<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Chicken Monitoring System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #d7ffd9, #e8f5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Poppins", sans-serif;
    }

    .main-container {
      width: 90%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      animation: fadeIn 0.7s ease;
    }

    /* LEFT SIDE */
    .info-side {
      flex: 1;
      background: linear-gradient(145deg, #2e7d32, #43a047, #66bb6a);
      color: #ffffff;
      padding: 70px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .info-side h1 {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .info-side p {
      font-size: 1.05rem;
      margin-top: 12px;
      font-weight: 300;
      opacity: 0.95;
    }

    /* RIGHT SIDE */
    .form-side {
      flex: 1;
      padding: 60px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-side h3 {
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      color: #2e7d32;
      margin-bottom: 25px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #cfd8dc;
      transition: all 0.25s ease;
      font-size: 0.95rem;
    }

    .form-control:focus {
      border-color: #43a047;
      box-shadow: 0 0 8px rgba(67,160,71,0.25);
    }

    .btn-signup {
      background: #43a047;
      border: none;
      padding: 13px;
      border-radius: 12px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: 0.3s ease;
    }

    .btn-signup:hover {
      background: #2e7d32;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(46,125,50,0.35);
    }

    .link-text {
      text-align: center;
      margin-top: 18px;
      font-size: 0.95rem;
    }

    .link-text a {
      color: #2e7d32;
      font-weight: 600;
      text-decoration: none;
    }

    .link-text a:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      .info-side {
        text-align: center;
        padding: 50px 25px;
      }
      .form-side {
        padding: 40px 25px;
      }
    }

  </style>

</head>
<body>

  <div class="main-container">

    <!-- LEFT PANEL -->
    <div class="info-side">
      <h1>🐔 Join the Smart Chicken Monitoring System</h1>
      <p>Monitor, analyze, and automate your farm using AI-powered environmental, audio, and vision analytics.</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="form-side">
      <h3>Create Your Account</h3>

      <form action="/signup" method="POST">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <input type="text" name="farm_name" class="form-control" placeholder="Farm Name (optional)">
        <input type="text" name="location" class="form-control" placeholder="Location (optional)">

        <button type="submit" class="btn-signup w-100 mt-2">Sign Up</button>
      </form>

      <div class="link-text">
        Already have an account? <a href="{{ url_for('login') }}">Log In</a>
      </div>
    </div>

  </div>

</body>
</html>
